<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title description">
  <title id="title">Robust OTA updates for Raspberry Pi</title>
  <desc id="description">A stylized Raspberry Pi board with a firmware controller and A and B system slots.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111722"/>
      <stop offset="0.55" stop-color="#0b0d12"/>
      <stop offset="1" stop-color="#07101a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#0ea5e9" stop-opacity="0.34"/>
      <stop offset="0.5" stop-color="#0ea5e9" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#172a3a"/>
      <stop offset="1" stop-color="#0d1823"/>
    </linearGradient>
    <linearGradient id="slotA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#0878b0"/>
    </linearGradient>
    <linearGradient id="slotB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17212d"/>
      <stop offset="1" stop-color="#101720"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#7dd3fc" stroke-opacity="0.055"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.48"/>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#38bdf8"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#background)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="925" cy="310" rx="360" ry="330" fill="url(#glow)"/>
  <circle cx="1138" cy="74" r="116" fill="#0ea5e9" opacity="0.045"/>
  <circle cx="53" cy="601" r="170" fill="#0ea5e9" opacity="0.035"/>

  <g transform="translate(72 64)">
    <rect width="224" height="38" rx="19" fill="#0ea5e9" fill-opacity="0.13" stroke="#38bdf8" stroke-opacity="0.52"/>
    <circle cx="21" cy="19" r="5" fill="#38bdf8"/>
    <text x="37" y="25" fill="#b8e6fe" font-family="IBM Plex Sans, sans-serif" font-size="14" font-weight="700" letter-spacing="1.8">RASPBERRY PI · OTA</text>
  </g>

  <g font-family="IBM Plex Sans, sans-serif">
    <text x="72" y="180" fill="#f7fbff" font-size="60" font-weight="700" letter-spacing="-2">Robust OTA Updates</text>
    <text x="72" y="247" fill="#f7fbff" font-size="60" font-weight="700" letter-spacing="-2">for Raspberry Pi</text>
    <rect x="72" y="282" width="86" height="5" rx="2.5" fill="#0ea5e9"/>
    <text x="72" y="338" fill="#a9b7c8" font-size="23" font-weight="400">How A/B system updates use</text>
    <text x="381" y="338" fill="#7dd3fc" font-size="23" font-weight="700">tryboot</text>
    <text x="72" y="372" fill="#a9b7c8" font-size="23" font-weight="400">to update safely and roll back automatically.</text>
  </g>

  <g transform="translate(72 462)" font-family="IBM Plex Sans, sans-serif">
    <g>
      <circle cx="17" cy="17" r="17" fill="#34d399" fill-opacity="0.14" stroke="#34d399" stroke-opacity="0.55"/>
      <path d="M9 17.5l5 5L25 11" fill="none" stroke="#6ee7b7" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="46" y="23" fill="#d9e3ed" font-size="18" font-weight="600">Power-loss safe</text>
    </g>
    <g transform="translate(220 0)">
      <circle cx="17" cy="17" r="17" fill="#0ea5e9" fill-opacity="0.14" stroke="#38bdf8" stroke-opacity="0.55"/>
      <path d="M17 8v9l6 4" fill="none" stroke="#7dd3fc" stroke-width="2.5" stroke-linecap="round"/>
      <text x="46" y="23" fill="#d9e3ed" font-size="18" font-weight="600">One-shot boot</text>
    </g>
    <g transform="translate(440 0)">
      <circle cx="17" cy="17" r="17" fill="#f59e0b" fill-opacity="0.13" stroke="#fbbf24" stroke-opacity="0.5"/>
      <path d="M25 17a8 8 0 10-2.5 5.8M25 11v6h-6" fill="none" stroke="#fcd34d" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="46" y="23" fill="#d9e3ed" font-size="18" font-weight="600">Local fallback</text>
    </g>
  </g>

  <g transform="translate(744 82)" filter="url(#shadow)">
    <rect x="42" y="22" width="342" height="454" rx="36" fill="#111923" stroke="#31516a" stroke-width="2"/>
    <rect x="56" y="36" width="314" height="426" rx="26" fill="#0d141d" stroke="#162b3d"/>

    <g fill="#7dd3fc" opacity="0.66">
      <circle cx="84" cy="52" r="4"/><circle cx="102" cy="52" r="4"/><circle cx="120" cy="52" r="4"/><circle cx="138" cy="52" r="4"/>
      <circle cx="156" cy="52" r="4"/><circle cx="174" cy="52" r="4"/><circle cx="192" cy="52" r="4"/><circle cx="210" cy="52" r="4"/>
      <circle cx="228" cy="52" r="4"/><circle cx="246" cy="52" r="4"/><circle cx="264" cy="52" r="4"/><circle cx="282" cy="52" r="4"/>
      <circle cx="300" cy="52" r="4"/><circle cx="318" cy="52" r="4"/><circle cx="336" cy="52" r="4"/>
    </g>

    <circle cx="79" cy="91" r="11" fill="none" stroke="#294559" stroke-width="5"/>
    <circle cx="347" cy="91" r="11" fill="none" stroke="#294559" stroke-width="5"/>
    <circle cx="79" cy="423" r="11" fill="none" stroke="#294559" stroke-width="5"/>
    <circle cx="347" cy="423" r="11" fill="none" stroke="#294559" stroke-width="5"/>

    <g transform="translate(97 101)" filter="url(#softShadow)">
      <rect width="232" height="128" rx="19" fill="url(#chip)" stroke="#2d536d" stroke-width="2"/>
      <g stroke="#31516a" stroke-width="3">
        <path d="M24-8v8M52-8v8M80-8v8M108-8v8M136-8v8M164-8v8M192-8v8M208-8v8"/>
        <path d="M24 128v8M52 128v8M80 128v8M108 128v8M136 128v8M164 128v8M192 128v8M208 128v8"/>
        <path d="M-8 24h8M-8 52h8M-8 80h8M-8 104h8"/>
        <path d="M232 24h8M232 52h8M232 80h8M232 104h8"/>
      </g>
      <rect x="48" y="22" width="136" height="84" rx="17" fill="#0ea5e9" fill-opacity="0.15" stroke="#38bdf8"/>
      <text x="116" y="58" text-anchor="middle" fill="#b8e6fe" font-family="IBM Plex Sans, sans-serif" font-size="15" font-weight="700" letter-spacing="2">FIRMWARE</text>
      <text x="116" y="85" text-anchor="middle" fill="#f7fbff" font-family="IBM Plex Sans, sans-serif" font-size="20" font-weight="700">try once</text>
    </g>

    <g transform="translate(83 282)" font-family="IBM Plex Sans, sans-serif">
      <g filter="url(#softShadow)">
        <rect width="126" height="105" rx="18" fill="url(#slotA)" stroke="#7dd3fc" stroke-opacity="0.8"/>
        <text x="18" y="31" fill="#dff5ff" font-size="12" font-weight="700" letter-spacing="1.5">SYSTEM</text>
        <text x="18" y="70" fill="#fff" font-size="42" font-weight="700">A</text>
        <rect x="18" y="83" width="89" height="7" rx="3.5" fill="#dff5ff" opacity="0.38"/>
      </g>
      <g transform="translate(155 0)" filter="url(#softShadow)">
        <rect width="126" height="105" rx="18" fill="url(#slotB)" stroke="#365267"/>
        <text x="18" y="31" fill="#93a9bb" font-size="12" font-weight="700" letter-spacing="1.5">SYSTEM</text>
        <text x="18" y="70" fill="#dbe7f1" font-size="42" font-weight="700">B</text>
        <rect x="18" y="83" width="89" height="7" rx="3.5" fill="#7d91a2" opacity="0.3"/>
      </g>
      <path d="M132 51h15" fill="none" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowCyan)"/>
    </g>

    <g fill="#203647">
      <rect x="370" y="133" width="31" height="88" rx="7"/>
      <rect x="370" y="238" width="31" height="51" rx="7"/>
      <rect x="25" y="147" width="25" height="107" rx="6"/>
    </g>
  </g>

</svg>
